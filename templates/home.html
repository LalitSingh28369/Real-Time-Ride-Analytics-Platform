<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ride Booking Home</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #000000, #1a1a1a);
        }

        .container {
            max-width: 600px;
            width:100%;
            background: #111;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            text-align:center;
            border:1px solid rgba(255, 204, 0, 0.3);
        }

        h1 {
            color: #ffcc00;
            margin-bottom:15px;
            font-size:28px;
        }

        p {
            color: #ccc;
            margin-bottom:25px;
            font-size:15px;
        }

        .button {
            display: inline-block;
            padding: 12px 25px;
            font-size: 16px;
            color: #000;
            background: linear-gradient(135deg, #ffcc00, #ffd633);
            border: none;
            border-radius: 30px;
            text-decoration: none;
            font-weight:600;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(255,204,0,0.4);
        }

        .button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 30px rgba(255,204,0,0.7);
            background: linear-gradient(135deg, #ffd633, #ffcc00);
        }

        .tag {
            display:inline-block;
            padding:5px 12px;
            background:#ffcc00;
            color:#000;
            border-radius:20px;
            font-size:12px;
            margin-bottom:15px;
            font-weight:600;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="tag">UBER RIDES</div>
        <h1>Welcome to Ride Booking</h1>
        <p>Fast, safe and reliable rides at your fingertips. Experience premium travel with just one click.</p>
        <a href="/book" class="button">Book a Ride</a>
    </div>
</body>
</html>
