<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ride Confirmed</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

        body{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background: radial-gradient(circle at top, #000000, #0f0f0f, #1a1a1a);
            color:#fff;
        }

        .container{
            max-width:520px;
            width:90%;
            background:#111;
            border-radius:20px;
            padding:35px 30px;
            text-align:center;
            box-shadow:0 25px 60px rgba(0,0,0,0.8);
            position:relative;
            overflow:hidden;
            border:1px solid rgba(255, 204, 0, 0.25);
        }

        /* subtle yellow glow */
        .container::before{
            content:"";
            position:absolute;
            width:200px;
            height:200px;
            background:rgba(255,204,0,0.2);
            filter:blur(80px);
            top:-60px;
            right:-60px;
        }

        .icon{
            font-size:50px;
            margin-bottom:15px;
            animation:pop 0.6s ease;
        }

        @keyframes pop{
            0%{transform:scale(0.5);opacity:0}
            100%{transform:scale(1);opacity:1}
        }

        h1{
            font-size:28px;
            font-weight:700;
            color:#ffcc00;
            margin-bottom:10px;
        }

        p{
            color:#ccc;
            font-size:15px;
            margin-bottom:25px;
        }

        .ride-info{
            background:#1a1a1a;
            border-radius:12px;
            padding:15px;
            margin-bottom:20px;
            text-align:left;
            font-size:14px;
            color:#ddd;
        }

        .ride-info div{
            margin-bottom:6px;
        }

        .button{
            display:inline-block;
            padding:12px 25px;
            font-size:15px;
            font-weight:600;
            color:#000;
            background:linear-gradient(135deg,#ffcc00,#ffd633);
            border-radius:30px;
            text-decoration:none;
            transition:0.3s;
            box-shadow:0 10px 25px rgba(255,204,0,0.5);
        }

        .button:hover{
            transform:translateY(-3px) scale(1.07);
            box-shadow:0 15px 35px rgba(255,204,0,0.8);
        }

        .footer{
            margin-top:15px;
            font-size:12px;
            color:#888;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✅</div>
        <h1>Ride Confirmed</h1>
        <p>Your ride has been successfully booked. Sit back and relax 🚗</p>

        
 
        </div>

        

   
    </div>
</body>
</html>
